name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Buildozer Android Build
        uses: kivy/buildozer-action@v1.2.4
        with:
          buildozer_version: stable
          python_version: 3.11
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GestorMarcenaria-APK
          path: bin/*.apk
