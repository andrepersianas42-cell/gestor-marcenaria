name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            build-essential libssl-dev libffi-dev \
            libsqlite3-dev python3-dev \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and Build Tools
        run: |
          sdkmanager --install "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Prepare Buildozer Android environment
        run: |
          BUILDOZER_SDK=/home/runner/.buildozer/android/platform/android-sdk
          BUILDOZER_PLATFORM=/home/runner/.buildozer/android/platform

          # Criar diretório real (não symlink) para poder adicionar wrapper
          mkdir -p $BUILDOZER_SDK/tools/bin

          # Descobrir o sdkmanager novo (compatível com Java 17)
          REAL_SDKMANAGER=$(find $ANDROID_SDK_ROOT/cmdline-tools -name "sdkmanager" -type f 2>/dev/null | head -1)
          echo "Novo sdkmanager encontrado em: $REAL_SDKMANAGER"

          # Criar wrapper: Buildozer chama o antigo tools/bin/sdkmanager
          # que redirecionamos para o novo (funciona com Java 17)
          cat > $BUILDOZER_SDK/tools/bin/sdkmanager << WRAPPER
          #!/bin/bash
          exec "$REAL_SDKMANAGER" "\$@"
          WRAPPER
          chmod +x $BUILDOZER_SDK/tools/bin/sdkmanager

          # Symlink dos componentes do SDK (build-tools, platforms, ndk, etc.)
          for dir in build-tools platform-tools platforms ndk cmdline-tools licenses emulator; do
            if [ -d "$ANDROID_SDK_ROOT/$dir" ]; then
              ln -sf "$ANDROID_SDK_ROOT/$dir" "$BUILDOZER_SDK/$dir"
              echo "Linkado: $dir"
            fi
          done

          # Symlink do NDK no formato que o Buildozer espera (android-ndk-r25b)
          ln -sf "$ANDROID_SDK_ROOT/ndk/25.2.9519653" "$BUILDOZER_PLATFORM/android-ndk-r25b"

          # Verificar estrutura
          echo "=== Build-tools disponíveis ==="
          ls $BUILDOZER_SDK/build-tools/
          echo "=== NDK ==="
          ls $BUILDOZER_PLATFORM/ | grep ndk

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROIDSDK: ${{ env.ANDROID_SDK_ROOT }}
          ANDROIDNDK: ${{ env.ANDROID_NDK_HOME }}

      - name: Upload APK as artifact (backup)
        uses: actions/upload-artifact@v4.6.2
        with:
          name: GestorMarcenaria-APK
          path: bin/*.apk
          retention-days: 90

      - name: Get version from buildozer.spec
        id: get_version
        run: |
          VERSION=$(grep '^version' buildozer.spec | head -1 | awk -F= '{print $2}' | tr -d ' ')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-build-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: "Gestor Marcenaria ${{ steps.get_version.outputs.tag }}"
          body: |
            ## 📱 Gestor Marcenaria — APK para Android

            ### Como instalar no celular/tablet:
            1. **Baixe o arquivo `.apk`** clicando em `Assets` abaixo
            2. No celular, vá em **Configurações → Segurança → Fontes desconhecidas** e ative
            3. Abra o arquivo baixado e toque em **Instalar**
            4. Pronto! O app estará disponível no seu dispositivo ✅

            > ⚠️ Este é um build de **desenvolvimento (debug)**. Para uso pessoal e interno.
          files: bin/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
